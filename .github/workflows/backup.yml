name: Weekly DB Backup

on:
  schedule:
    - cron: '0 8 * * 2'  # Every Tuesday at 3:00 AM EST (8:00 UTC)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump and push backup on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Dump database
            docker exec mydoglog-db pg_dump -U mydoglog -d mydoglog --clean --if-exists | gzip > /tmp/mydoglog-backup.sql.gz

            # Clone or pull backup repo
            if [ -d /tmp/vps-backups ]; then
              cd /tmp/vps-backups && git pull
            else
              git clone git@github.com:Averyy/vps-backups.git /tmp/vps-backups
            fi

            # Copy dump and push
            mkdir -p /tmp/vps-backups/mydoglog
            cp /tmp/mydoglog-backup.sql.gz /tmp/vps-backups/mydoglog/mydoglog.sql.gz
            cd /tmp/vps-backups
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add mydoglog/mydoglog.sql.gz
            if git diff --cached --quiet; then
              echo "No changes to backup"
            else
              git commit -m "mydoglog: weekly DB snapshot $(date +%Y-%m-%d)"
              git push
            fi

            # Cleanup dump
            rm -f /tmp/mydoglog-backup.sql.gz
