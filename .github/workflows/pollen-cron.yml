name: Daily Pollen Sync

on:
  schedule:
    - cron: '30 12 * * *'  # Daily at 12:30 UTC (30min after pollen-sparr scrapes)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pollen sync
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://mydoglog.ca/api/cron/pollen)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Pollen sync failed with HTTP $HTTP_CODE"
            exit 1
          fi
